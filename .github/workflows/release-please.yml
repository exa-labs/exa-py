name: release-please

# Release automation for exa-py.
#
# Flow: merges to `master` with Conventional Commit titles keep a single
# Release PR up to date. That PR updates versions across pyproject.toml,
# setup.py, uv.lock, and CHANGELOG.md. Merging the Release PR creates the git
# tag and GitHub Release, which gates the publish job below. Publishing uploads
# to PyPI using an API token (secret PYPI_API_TOKEN) scoped to the `pypi`
# environment.

on:
  push:
    branches: [master]

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target-branch: master
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          persist-credentials: false

      - uses: astral-sh/setup-uv@ed6a87212f18ff208fa7d14a360aba03f867cba9 # v6.4

      - name: Build sdist + wheel
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # v1.12.4
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
