name: Run Examples

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  run-examples:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        batch: [1, 2, 3]

    env:
      EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    name: Examples (Batch ${{ matrix.batch }})

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.5
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: |
          poetry install
      - name: Run examples batch ${{ matrix.batch }}
        run: |
          examples=($(find examples -name "*.py" -type f | sort))
          total=${#examples[@]}
          per_batch=$(( (total + 2) / 3 ))
          start=$(( (matrix_batch - 1) * per_batch ))

          # TEMPORARY (2026-07-08): /research/v1 rejects every request that
          # includes an output schema — the backend's schema validation calls
          # its LLM with temperature=0.1, which the model no longer supports
          # (sample requestId: bc221b85a56b4509de7e5d8eebc55121). Skip the
          # schema-based research examples until the backend fix ships, then
          # delete this list.
          skip_examples=(
            "examples/research/async_example.py"
            "examples/research/schema_example.py"
          )

          echo "Batch ${{ matrix.batch }}: running ${examples[@]:$start:$per_batch}"

          if [ "$matrix_batch" -eq 3 ]; then
            # Run batch 3 in parallel to speed up slow examples
            pids=()
            for example in "${examples[@]:$start:$per_batch}"; do
              if [[ " ${skip_examples[*]} " == *" $example "* ]]; then
                echo "Skipping (known backend issue, see workflow comment): $example"
                continue
              fi
              echo "Starting: $example"
              poetry run python "$example" &
              pids+=($!)
            done
            # Wait for all and check exit codes
            failed=0
            for pid in "${pids[@]}"; do
              wait $pid || failed=1
            done
            exit $failed
          else
            for example in "${examples[@]:$start:$per_batch}"; do
              if [[ " ${skip_examples[*]} " == *" $example "* ]]; then
                echo "Skipping (known backend issue, see workflow comment): $example"
                continue
              fi
              echo "Running: $example"
              poetry run python "$example"
            done
          fi
        env:
          matrix_batch: ${{ matrix.batch }}
